# NMR Plot Configuration - Experiment 48 (Static)
# Edit this file and run: python plot.py -c config_exp48_static.yaml

experiment_id: "exp-48-static"
date: "2026-07-16"

# Data source
data_file: "data/exp48_static.csv"
data_format: "csv"

# Processing pipeline
processing:
  phase:
    auto: true
    phase0: 0
    phase1: 0
    entropy_method: "hybrid"

  baseline:
    method: "polynomial"
    poly_order: 3

  smoothing:
    method: "none"

  peak_picking:
    enabled: false
    threshold: 0.05
    min_distance: 10
    annotate: true

# Plotting configuration
plots:
  - file: "data/exp48_static.csv"
    label: "Static (400 MHz benchtop)"
    color: "tab:blue"
    linewidth: 1.5
    linestyle: "solid"
    alpha: 0.9

figure_style:
  template: "nature"
  font_family: "sans-serif"
  font_size: 10
  dpi: 300

figure:
  title: "Exp 48: Static Spectrum"
  xlim: [-150, 50]
  ylim: null
  xlabel: "Chemical Shift (ppm)"
  ylabel: "Intensity (a.u.)"
  grid: true
  legend_position: "upper right"
  legend_frameon: true
  legend_fontsize: 9

# Analysis options
analysis:
  linewidth:
    enabled: true
    method: "fwhm"
    peak_region: [-100, -60]
    report_csv: "figures/linewidth_static.csv"

  snr:
    enabled: true
    signal_region: [-90, -70]
    noise_region: [100, 150]
    report_csv: "figures/snr_static.csv"

# Output settings
output_dir: "figures"
output_formats: ["pdf", "png"]
