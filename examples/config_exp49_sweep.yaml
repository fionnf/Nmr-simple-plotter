# NMR Plot Configuration - Experiment 49 (Magic Angle Sweep)
# Edit this file and run: python plot.py -c config_exp49_sweep.yaml

experiment_id: "exp-49-sweep"
date: "2026-07-16"

# Data source
data_file: "data/exp49_sweep_0deg.csv"
data_format: "csv"

# Processing pipeline
processing:
  phase:
    auto: true
    phase0: 0
    phase1: 0

  baseline:
    method: "polynomial"
    poly_order: 3

  smoothing:
    method: "none"

  peak_picking:
    enabled: false

# Plotting configuration
plots:
  - file: "data/exp49_sweep_0deg.csv"
    label: "0°"
    color: "tab:blue"
    linewidth: 1.5

  - file: "data/exp49_sweep_30deg.csv"
    label: "30°"
    color: "tab:orange"
    linewidth: 1.5

  - file: "data/exp49_sweep_54dot7deg.csv"
    label: "54.7° (Magic Angle)"
    color: "tab:green"
    linewidth: 1.5

figure_style:
  template: "nature"
  font_family: "sans-serif"
  font_size: 10
  dpi: 300

figure:
  title: "Exp 49: Magic Angle Sweep"
  xlim: [-150, 50]
  ylim: null
  xlabel: "Chemical Shift (ppm)"
  ylabel: "Intensity (a.u.)"
  grid: true
  legend_position: "upper right"

# Analysis: detect magic angle from linewidth
analysis:
  linewidth:
    enabled: true
    method: "fwhm"
    peak_region: [-100, -60]
    report_csv: "figures/linewidth_sweep.csv"

output_dir: "figures"
output_formats: ["pdf", "png"]
